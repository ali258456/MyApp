workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 60
    environment:
      vars:
        # اگر از EAS استفاده می‌کنی و نیاز به Expo token داری، اینجا قرار بده
        # EXPO_TOKEN: Encrypted(<your-expo-token>)
        # اگر نمی‌خوای token اضافه کنی، خط بالا را کامنت بگذار
    scripts:
      - name: Install dependencies
        script: yarn install
      - name: Prebuild Expo
        script: npx expo prebuild
      - name: Build APK
        script: cd android && gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk
